- 2024/09/16: 網膜剥離 49日目
  comment: 右眼の視力が落ちたので左右のバランスが悪いため遠近両用眼鏡のレンズを変えられないか眼鏡屋に相談にいく。左目は矯正視力1.2だけど、右眼はこれ以上レンズを変えても視力が1.0で頭打ちなので、このまま使うしかないとのこと。利き目が左目なので、アンバランスを気にしないで使い続けるのが良いと言われた。
- 2024/08/30: 網膜剥離 32日目
  comment: 影は引き続き見える。視力は日ごとに調子が変わりまだ安定してないが、ここ2週間で若干良くなった気がする。硝子体を切除した副次効果として小学生の頃から見えていた飛蚊症の見え方が変わった。手術前はまではミトコンドリアみたいなのが眼に浮かんでいたが、今は黒い点々が浮かんでいる。以前の飛蚊症はかなり邪魔だったので、視野がクリアーになったと思う。
- 2024/08/17: 網膜剥離 19日目
