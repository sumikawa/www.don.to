- 1998/09/12: "「タイタニック」"
  comment: サンノゼのFry'sで発売日に購入したビデオ。映画館には足を伸ばさなかったので初めて観たことになります。うー、泣いちまったい。Roseおばあさんがいい味出してますな。最後の無邪気な笑顔が忘れられません。この人の回想という形を取ってるから物語に厚みが出たんだろうな。これなかったら普通のラブ・ロマンスだもん。
- 1998/09/11: 「<a href="https://www.amazon.co.jp/dp/457550680X/">餓狼伝〈8〉</a>」、夢枕 獏、双葉社
  comment: 近所に図書館を発見しました。文庫本至上主義の僕としては、新書、ハードカバーは絶対に購入しません。なので、まだ文庫になる前の本をタダで読める図書館の存在は大きい。内容ですが、相変わらず獏の作品は安定して面白いです。
- 1998/09/03: 「<a href="https://www.amazon.co.jp/dp/4101386129/">殺人鬼</a>」、綾辻 行人、新潮社
  comment: 成田空港から家に戻る途中に暇だったので、本屋で購入。クリスティに触発されて久しぶりに綾辻行人の小説を読みたくなりました。推理小説ってちょっとしたコメントがネタバレにつながるので何も書きませんが、綾辻行人の作品にしては面白くなかった。
- 1998/08/31: 「<a href="https://www.amazon.co.jp/dp/4151300236/">満潮に乗って</a>」、アガサ・クリスティー、早川書房
  comment: 帰りの飛行機用に確保しておいたんだけど読んじゃった。推理物って久しぶりに読んだな。綾辻行人以外の作家だと数年ぶりではなかろうか。ポアロ物です。クリスティの作品の中では50点ぐらいの出来。
- 1998/08/29: 「<a href="https://www.amazon.co.jp/dp/B0007Z9YAU/">ロリータ</a>」
  comment: "「ロックンロール体操」の後、チャンネル変えたらCATVで映画「ロリータ」やってました。「ロリコン」の語源ですね。ナボコフの書いた小説の方は大学生の時に読んでたので、英語を聞き取れないまでも何とかストーリーにはついていけました。映画全体の雰囲気がすごく良かったので、気に入りました。叙情的な感じがいいね。DVDあったら欲しいな。"
- 1998/08/19: "「Fat Cat」"
  comment: 買いはしませんでしたが、Doverの本屋で太った猫の写真集が売られてました。ブクブクに太った飼い主とのツーショットもあって、微笑ましい半面、ちょっと不気味でした。もうちょっと写真が綺麗だったら購入してたかも。
- 1998/08/11: 「<a href="https://www.amazon.co.jp/dp/4334726569/">毒猿 新宿鮫〈2〉</a>」、大沢 在昌、光文社
  comment: 新宿鮫シリーズは、新書のときに友人から借りて読んでました。気に入ったので、文庫化を機に購入して、再読。ハードボイルドが良い。月刊アフタヌーンで連載している「地雷震」という漫画が好きな人ならきっと気に入ると思う。ちょっとノリは違うけどね。
