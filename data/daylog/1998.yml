  comment: 前作「緋色の囁き」と同じく、バランスの悪さが気になりました。うーむ、綾辻さんもそろそろ飽きてきたか?
- 1998/12/21: 「<a href="https://www.amazon.co.jp/dp/4257767456/">キマイラ縁生変</a>」、夢枕 獏、ソノラマ文庫
  comment: 昔の話が続いていてあまり燃えませんでした。はやく現代に戻らないかなあ。
- 1998/12/19: 「<a href="https://www.amazon.co.jp/dp/4150305943/">たまご猫</a>」、皆川 博子、ハヤカワ文庫
  comment: 短篇集です。幻想小説というのかな、ちょっと恐い感じの小品が並んでいます。文章がうまいですね、特に「春の滅び」がよかった。
- 1998/11/26: 「<a href="https://www.amazon.co.jp/dp/B00005NJUZ/">スタンド・バイ・ミー</a>」
  comment: レンタルDVD第二段。内容は今更説明するまでもないと思うので省略。そこそこ楽しめましたが、なぜこれが名作と呼ばれてるのか分からんかった。普通やん。
