- 2023/03/06: 白内障手術 その後
  comment: 右目が乱視になっちゃって、結局平日も週末もしんどいのでメガネを作ることにする。近距離は右目が乱視のみ、左目は老眼補正と乱視補正。遠距離は乱視にプラスして距離の調整。スマホ距離は裸眼が一番ラクなので、メガネ2つと裸眼を使い分けることになり、ちょこちょことメガネを変えるため脳が補正しきれずにバグっている。特に遠距離は今まで脳が補正してくれてたけど、メガネに甘えてめっきり補正してくれず今まで以上に何も見えなくなった。
- 2023/02/27: 一日一食ダイエット開始
  comment: 人間ドックの結果が悪く要経過観察を通り過ぎた。肝臓はともかく腎臓が悪くなると旅行にも制限がでるのでさすがに節制をすることにする。食事ごとにちまちま塩分制限するぐらいならいっそと一日一食ダイエットはじめました。オートファジーにも期待。
- 2023/01/27: 白内障手術 その後
  comment: モニターが見えづらくなったので眼科へ。右眼が矯正0.8。左目は矯正して1.2。手術した側の右目の視力が落ちている。現時点で不正乱視ではなく、かつ後発白内障ではないが、反射が低いとのことで今後症状が進む可能性もあるとのこと。一ヶ月後ぐらいに改めて再診察。左目は白内障が出始めているが手術するレベルではない、ただし瞳孔にかかっている部分が濁っているので見づらいのではないか。近距離用の眼鏡が必要になりそう。
