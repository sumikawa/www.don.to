- 2004/02/17: 今日のサウナ
  comment: 「サウナは男の戦場である ——島本和彦」 初めて平日の夜にジムに行く。仕事帰りのサラリーマンで混んでます。\n例によってサウナに向かったところ、先客が二人。<a href="http://www.lares.dti.ne.jp/~kouta/heihachi.jpg">三島平八</a>みたいなインド人と、おっちゃんもう一人。さらに遅れて、たぶんアラブ系とスキンヘッドの筋肉兄ちゃんが入室。私入れてトータル5人でサウナ室はみっちり。\n5分後、まず先客の二人がサウナを出て行く。ここまでは勝って当り前。勝負はこれからである。アラブ系も早々に退散。残るはスキンヘッドとの一騎打ち。汗ダラダラ流しながら双方動かず。しかし、ついにスキンヘッドが立ち上がったぁ! ほっとする私。しかし、奴は一段下に降りて再び座り直す。しまった、こっちの気を緩める高等戦術か。やるじゃねえか。しかしアジア系の名誉にかけて私は負けない。\nアルカイックスマイルで対抗。1分後スキンヘッド退場。こうして私は勝利を収めた。もう一度言おう。サウナは男の戦場である。
